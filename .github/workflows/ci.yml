name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: corepack enable
      - run: yarn install --frozen-lockfile
      - run: yarn --cwd test install --frozen-lockfile
      - run: yarn test
      - run: yarn --cwd test test-plugin
      - run: yarn --cwd test test-hoc
